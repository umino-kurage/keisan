<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セット発注最適化</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f8f9fa; }
        h2 { text-align: center; color: #333; }
        .row { background: white; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; gap: 8px; align-items: center; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 0; }
        .btn-add { background: #6c757d; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; margin-bottom: 10px; }
        .btn-calc { background: #28a745; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; }
        .result-box { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-top: 20px; line-height: 1.6; }
        .pattern { margin-top: 15px; padding: 10px; border-radius: 8px; }
        .up { background: #e8f5e9; border: 1px solid #c8e6c9; }
        .down { background: #fff3e0; border: 1px solid #ffe0b2; }
    </style>
</head>
<body>

    <h2>セット発注計算</h2>
    <div style="display: flex; gap: 5px; font-weight: bold; font-size: 12px; color: #666; margin-bottom: 5px; padding: 0 5px;">
        <div style="flex:1;">項目名</div><div style="flex:1;">規定数</div><div style="flex:1;">注文数</div>
    </div>

    <div id="itemsContainer">
        <div class="row">
            <input type="text" class="name" value="項目A"><input type="number" class="inner" value="7"><input type="number" class="order" value="15">
            <button style="width:30px; background:none; color:red;" onclick="this.parentElement.remove()">×</button>
        </div>
        <div class="row">
            <input type="text" class="name" value="項目B"><input type="number" class="inner" value="3"><input type="number" class="order" value="5">
            <button style="width:30px; background:none; color:red;" onclick="this.parentElement.remove()">×</button>
        </div>
    </div>

    <button class="btn-add" onclick="addRow()">＋ 項目を追加</button>
    <button class="btn-calc" onclick="calculate()">計算する</button>

    <div id="result" class="result-box" style="display:none;"></div>

    <script>
        function addRow() {
            const div = document.createElement('div');
            div.className = 'row';
            div.innerHTML = `<input type="text" class="name" placeholder="項目"><input type="number" class="inner" placeholder="規定"><input type="number" class="order" placeholder="注文">
                             <button style="width:30px; background:none; color:red;" onclick="this.parentElement.remove()">×</button>`;
            document.getElementById('itemsContainer').appendChild(div);
        }

        function calculate() {
            const rows = document.querySelectorAll('.row');
            let maxSets = 0;
            const items = [];
            
            rows.forEach(r => {
                const inner = parseInt(r.querySelector('.inner').value) || 1;
                const order = parseInt(r.querySelector('.order').value) || 0;
                const sets = Math.ceil(order / inner);
                if (sets > maxSets) maxSets = sets;
                items.push({ name: r.querySelector('.name').value, inner, order });
            });

            // 1. 増やす案（最大セット数に合わせて揃える）
            let upHtml = `<div class="pattern up"><strong>【増やす案：${maxSets}セットに揃える】</strong><br>`;
            items.forEach(item => {
                const target = item.inner * maxSets;
                upHtml += `${item.name}: ${target - item.order}個追加で計${target}個<br>`;
            });
            upHtml += `</div>`;

            // 2. 減らす案（1つ下のセット数に揃える ※0セットは除外）
            const minSets = Math.max(1, maxSets - 1);
            let downHtml = `<div class="pattern down"><strong>【減らす案：${minSets}セットに揃える】</strong><br>`;
            items.forEach(item => {
                const target = item.inner * minSets;
                downHtml += `${item.name}: ${item.order - target}個減らして計${target}個<br>`;
            });
            downHtml += `</div>`;

            const res = document.getElementById('result');
            res.style.display = "block";
            res.innerHTML = upHtml + downHtml;
        }
    </script>
</body>
</html>
