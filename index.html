<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セット発注最適化</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background-color: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 10px; }
        th, td { padding: 8px 4px; border: 1px solid #ddd; text-align: center; }
        input { width: 100%; padding: 5px; box-sizing: border-box; }
        .btn-add { background: #6c757d; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; margin-bottom: 10px; }
        .btn-calc { background: #28a745; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; }
        .pattern { background: white; padding: 15px; border-radius: 8px; border-left: 5px solid #28a745; margin-top: 15px; }
    </style>
</head>
<body>

    <h2>発注最適化</h2>
    <table>
        <thead><tr><th>項目名</th><th>規定</th><th>注文</th><th></th></tr></thead>
        <tbody id="itemsBody">
            <tr>
                <td><input type="text" class="name-input" value="項目A"></td>
                <td><input type="number" class="inner-input" value="7"></td>
                <td><input type="number" class="order-input" value="15"></td>
                <td><button onclick="this.parentElement.parentElement.remove()" style="color:red;">✕</button></td>
            </tr>
            <tr>
                <td><input type="text" class="name-input" value="項目B"></td>
                <td><input type="number" class="inner-input" value="3"></td>
                <td><input type="number" class="order-input" value="5"></td>
                <td><button onclick="this.parentElement.parentElement.remove()" style="color:red;">✕</button></td>
            </tr>
        </tbody>
    </table>

    <button class="btn-add" onclick="addRow()">＋ 項目を追加</button>
    <button class="btn-calc" onclick="calculate()">調整計算</button>
    <div id="result"></div>

    <script>
        function addRow() {
            const tbody = document.getElementById('itemsBody');
            const row = document.createElement('tr');
            row.innerHTML = `<td><input type="text" class="name-input"></td><td><input type="number" class="inner-input"></td><td><input type="number" class="order-input"></td><td><button onclick="this.parentElement.parentElement.remove()" style="color:red;">✕</button></td>`;
            tbody.appendChild(row);
        }

        function calculate() {
            const rows = document.querySelectorAll('#itemsBody tr');
            const items = [];
            rows.forEach(r => {
                items.push({
                    name: r.querySelector('.name-input').value,
                    inner: parseInt(r.querySelector('.inner-input').value) || 0,
                    order: parseInt(r.querySelector('.order-input').value) || 0
                });
            });

            let plans = [];
            // sはセット数
            for(let s = 1; s <= 10; s++) {
                let totalDiff = 0;
                let details = [];
                items.forEach(item => {
                    const perfect = item.inner * s;
                    // 【修正】現在の注文数を無視して、このセット数(s)に合わせるための調整数を計算する
                    // つまり、このセット数にするために何個必要か？という計算
                    const diff = Math.abs(perfect - item.order);
                    totalDiff += diff;
                    details.push({ name: item.name, perfect, diff, order: item.order });
                });
                plans.push({ s, totalDiff, details });
            }

            plans.sort((a, b) => a.totalDiff - b.totalDiff);

            const res = document.getElementById('result');
            res.innerHTML = "";
            plans.slice(0, 3).forEach(p => {
                let html = `<div class="pattern"><strong>【${p.s}セット案】</strong> 合計調整数: ${p.totalDiff}個<br>`;
                p.details.forEach(d => {
                    html += `<div><strong>${d.name}</strong><br>
                             ピッタリ数: ${d.perfect}個 | 希望(${d.order})<br>
                             最終発注数: <strong>${d.perfect}個</strong> (${d.perfect > d.order ? (d.perfect - d.order) + '足す' : (d.perfect < d.order ? (d.order - d.perfect) + '減らす' : '調整なし')})</div><hr>`;
                });
                html += `</div>`;
                res.innerHTML += html;
            });
        }
    </script>
</body>
</html>
