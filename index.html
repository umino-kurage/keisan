<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>セット発注最適化</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: white; padding: 10px; border-radius: 8px; }
        input { width: 60px; padding: 8px; }
        .name-input { width: 100px; }
        .btn-calc { background: #28a745; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .pattern { background: white; padding: 15px; margin-top: 15px; border-radius: 8px; border-left: 5px solid #28a745; line-height: 1.8; }
    </style>
</head>
<body>

    <h2>発注最適化ツール</h2>
    <div id="itemsContainer">
        <div class="row">
            <input type="text" class="name-input" value="項目A">
            <input type="number" class="inner-input" value="7">
            <input type="number" class="order-input" value="15">
        </div>
        <div class="row">
            <input type="text" class="name-input" value="項目B">
            <input type="number" class="inner-input" value="3">
            <input type="number" class="order-input" value="5">
        </div>
    </div>

    <button class="btn-calc" onclick="calculate()">計算する</button>
    <div id="result"></div>

    <script>
        function calculate() {
            const names = document.querySelectorAll('.name-input');
            const inners = document.querySelectorAll('.inner-input');
            const orders = document.querySelectorAll('.order-input');
            const res = document.getElementById('result');
            res.innerHTML = "";

            let items = [];
            for(let i=0; i<names.length; i++){
                items.push({
                    name: names[i].value,
                    inner: parseInt(inners[i].value),
                    order: parseInt(orders[i].value)
                });
            }

            // 1セット(s=1)から10セット(s=10)まで計算
            let plans = [];
            for(let s = 1; s <= 10; s++) {
                let totalDiff = 0;
                let details = [];
                items.forEach(item => {
                    const perfectCount = item.inner * s; // 規定ピッタリ数
                    const diff = perfectCount - item.order; // 今の注文との差
                    totalDiff += Math.abs(diff); // 調整合計は絶対値
                    details.push({ name: item.name, perfectCount, diff });
                });
                plans.push({ s, totalDiff, details });
            }

            // 調整合計が少ない順に並べる
            plans.sort((a, b) => a.totalDiff - b.totalDiff);

            // 上位2つを表示
            plans.slice(0, 2).forEach(p => {
                let html = `<div class="pattern"><strong>【${p.s}インナー案】（調整合計: ${p.totalDiff}個）</strong><br>`;
                p.details.forEach(d => {
                    let act = d.diff > 0 ? `${d.diff} 足す` : (d.diff < 0 ? `${Math.abs(d.diff)} 減らす` : "そのまま");
                    html += `・${d.name}: ピッタリ${d.perfectCount}個 (今の注文数から <strong>${act}</strong>)<br>`;
                });
                html += `</div>`;
                res.innerHTML += html;
            });
        }
    </script>
</body>
</html>
