<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>発注最適化ツール</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f8f9fa; margin: 0; }
        h2 { text-align: center; color: #333; }
        .header-row { display: flex; gap: 5px; margin-bottom: 5px; font-weight: bold; font-size: 12px; color: #666; text-align: center; }
        .header-row div { flex: 1; }
        .row { background: white; padding: 10px; margin-bottom: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; gap: 8px; align-items: center; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 0; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-add { background: #6c757d; color: white; margin-bottom: 20px; }
        .btn-calc { background: #007bff; color: white; }
        .result-box { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-top: 20px; line-height: 1.6; }
        .pattern-title { font-weight: bold; color: #444; border-bottom: 2px solid #eee; margin: 10px 0 5px 0; }
    </style>
</head>
<body>

    <h2>発注最適化ツール</h2>
    
    <div class="header-row">
        <div>項目名</div><div>規定数</div><div>注文数</div><div></div>
    </div>

    <div id="itemsContainer">
        <div class="row">
            <input type="text" class="name" value="項目A"><input type="number" class="inner" value="7"><input type="number" class="order" value="15">
            <button style="width:30px; background:none; color:red;" onclick="this.parentElement.remove()">×</button>
        </div>
        <div class="row">
            <input type="text" class="name" value="項目B"><input type="number" class="inner" value="3"><input type="number" class="order" value="5">
            <button style="width:30px; background:none; color:red;" onclick="this.parentElement.remove()">×</button>
        </div>
    </div>

    <button class="btn-add" onclick="addRow()">＋ 項目を追加</button>
    <button class="btn-calc" onclick="calculate()">調整パターンを計算する</button>

    <div id="result" class="result-box" style="display:none;"></div>

    <script>
        function addRow() {
            const div = document.createElement('div');
            div.className = 'row';
            div.innerHTML = `<input type="text" class="name" placeholder="名"><input type="number" class="inner" placeholder="数"><input type="number" class="order" placeholder="注">
                             <button style="width:30px; background:none; color:red;" onclick="this.parentElement.remove()">×</button>`;
            document.getElementById('itemsContainer').appendChild(div);
        }

        function calculate() {
            const rows = document.querySelectorAll('.row');
            const data = [];
            rows.forEach(r => {
                data.push({
                    name: r.querySelector('.name').value || "無題",
                    inner: parseInt(r.querySelector('.inner').value) || 1,
                    order: parseInt(r.querySelector('.order').value) || 0
                });
            });

            let downHtml = "<div class='pattern-title'>▼ 減らしてキリよく（切り捨て）</div>";
            data.forEach(item => {
                const sets = Math.floor(item.order / item.inner);
                const target = sets * item.inner;
                downHtml += `${item.name}: <strong>${sets}インナー</strong>にする (${target}個 / ${item.order - target}個減らす)<br>`;
            });

            let upHtml = "<div class='pattern-title'>▲ 増やしてキリよく（切り上げ）</div>";
            data.forEach(item => {
                const sets = Math.ceil(item.order / item.inner);
                const target = sets * item.inner;
                upHtml += `${item.name}: <strong>${sets}インナー</strong>にする (${target}個 / ${target - item.order}個増やす)<br>`;
            });

            const res = document.getElementById('result');
            res.style.display = "block";
            res.innerHTML = downHtml + "<br>" + upHtml;
        }
    </script>
</body>
</html>
