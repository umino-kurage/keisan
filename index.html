<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>発注数計算ツール（項目別計算）</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .row { margin-bottom: 8px; display: flex; align-items: center; }
        input { width: 100px; margin-right: 10px; padding: 5px; }
        button { cursor: pointer; padding: 5px 10px; }
        #result { margin-top: 20px; padding: 15px; border: 2px solid #007bff; background: #e7f3ff; }
    </style>
</head>
<body>

    <h2>発注数計算ツール</h2>
    <div id="itemsContainer">
        <div class="row">
            <input type="text" class="name" placeholder="項目名" value="項目A">
            <input type="number" class="inner" placeholder="1インナー数" value="7">
            <input type="number" class="order" placeholder="注文数" value="0">
        </div>
        <div class="row">
            <input type="text" class="name" placeholder="項目名" value="項目B">
            <input type="number" class="inner" placeholder="1インナー数" value="3">
            <input type="number" class="order" placeholder="注文数" value="0">
        </div>
    </div>

    <button onclick="addRow()">+ 項目を追加</button>
    <button onclick="calculate()" style="background:#28a745; color:white;">計算する</button>

    <div id="result">ここに結果が表示されます</div>

    <script>
        function addRow() {
            const div = document.createElement('div');
            div.className = 'row';
            div.innerHTML = `<input type="text" class="name" placeholder="項目名">
                             <input type="number" class="inner" placeholder="1インナー数">
                             <input type="number" class="order" placeholder="注文数">
                             <button onclick="this.parentElement.remove()">削除</button>`;
            document.getElementById('itemsContainer').appendChild(div);
        }

        function calculate() {
            const rows = document.querySelectorAll('.row');
            let resultsHtml = "<strong>【項目別計算結果】</strong><br><ul>";
            
            rows.forEach(row => {
                const name = row.querySelector('.name').value || "無題";
                const inner = parseInt(row.querySelector('.inner').value) || 0;
                const order = parseInt(row.querySelector('.order').value) || 0;

                if (inner > 0) {
                    const remainder = order % inner;
                    if (remainder === 0) {
                        resultsHtml += `<li>${name}: ぴったりです (計 ${order}個)</li>`;
                    } else {
                        const addMore = inner - remainder;
                        resultsHtml += `<li>${name}: あと ${addMore}個追加 または ${remainder}個減らす</li>`;
                    }
                } else {
                    resultsHtml += `<li>${name}: インナー数を入力してください</li>`;
                }
            });

            resultsHtml += "</ul>";
            document.getElementById('result').innerHTML = resultsHtml;
        }
    </script>
</body>
</html>
